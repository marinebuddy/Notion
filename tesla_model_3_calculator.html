<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테슬라 모델3 한국 가격표 (2022~2026)</title>
<link href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#fff;--bg2:#f7f7f5;--tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#9b9b9b;--bd:#e3e2de;--bd2:#d4d3cf;--accent:#2383e2;--accent-bg:#e8f0fe;--warn-bg:#fef3cd;--warn-tx:#856404;--radius:6px;--radius-lg:8px;--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#191919;--bg2:#252525;--tx:#e0e0e0;--tx2:#999;--tx3:#666;--bd:#3a3a3a;--bd2:#4a4a4a;--accent:#529cca;--accent-bg:#1a2d3d;--warn-bg:#3d3520;--warn-tx:#d4a843;}}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;padding:20px;max-width:720px;margin:0 auto;}
h2{font-size:20px;font-weight:600;margin-bottom:2px;}
.sub{font-size:12px;color:var(--tx2);margin-bottom:20px;}
label{font-size:13px;color:var(--tx2);display:block;margin-bottom:4px;}
select{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--radius);background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;outline:none;}
select:hover{border-color:var(--bd2);}select:focus{border-color:var(--accent);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.grid3{display:grid;gap:8px;margin-bottom:16px;}
.tc{padding:10px;border:1px solid var(--bd);border-radius:var(--radius-lg);text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);}
.tc:hover{border-color:var(--bd2);background:var(--bg2);}
.tc.a{border:2px solid var(--accent);background:var(--accent-bg);}
.tc .n{font-size:13px;font-weight:600;margin-bottom:1px;}
.tc .s2{font-size:11px;color:var(--tx3);margin-bottom:6px;}
.tc .pr{font-size:15px;font-weight:600;}
.note{font-size:12px;color:var(--warn-tx);background:var(--warn-bg);padding:8px 12px;border-radius:var(--radius);margin-bottom:12px;}
.cb{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;}
.cr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13px;}
.cr .l{color:var(--tx2);}
.ct{border-top:1px solid var(--bd);padding-top:8px;margin-top:4px;display:flex;justify-content:space-between;align-items:baseline;}
.ct .l{font-weight:600;font-size:14px;}
.ct .v{font-size:22px;font-weight:700;}
.sb{border:1px solid var(--bd);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;}
.sb h3{font-size:14px;font-weight:600;margin-bottom:8px;}
.sb p{font-size:12px;color:var(--tx2);margin-bottom:3px;}
.gb{font-size:12px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bd);}
details{margin-bottom:16px;}
summary{font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;}
summary:hover{color:var(--accent);}
.tt{width:100%;font-size:12px;border-collapse:collapse;}
.tt th{text-align:left;padding:6px 4px;color:var(--tx2);border-bottom:1px solid var(--bd);font-weight:500;}
.tt th:not(:first-child){text-align:right;}
.tt td{padding:5px 4px;border-bottom:1px solid var(--bd);}
.tt td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums;}
.tn{font-size:11px;color:var(--tx3);margin-top:8px;}
.est{opacity:0.7;font-style:italic;}
</style>
</head>
<body>
<h2>테슬라 모델3 한국 가격표</h2>
<p class="sub">2022~2026 시기별 트림 가격 + 옵션 조합 계산기 · 최종 업데이트: 2026.04.18</p>
<div class="grid2"><div><label>시기 선택</label><select id="period"></select></div><div><label>세대</label><div class="gb" id="gen"></div></div></div>
<div class="note" id="nb" style="display:none;"></div>
<div class="grid3" id="trims"></div>
<div class="grid2"><div><label>외장 색상</label><select id="color"></select></div><div><label>인테리어</label><select id="int"><option value="0">All Black (기본)</option><option value="1286000">Black & White (+128.6만)</option></select></div></div>
<div class="grid2"><div><label>휠</label><select id="wheel"></select></div><div><label>자율주행</label><select id="fsd"></select></div></div>
<div class="cb"><div class="cr"><span class="l">차량 기본가</span><span id="vb">-</span></div><div class="cr"><span class="l">옵션 합계</span><span id="vo">-</span></div><div class="ct"><span class="l">총 차량가</span><span class="v" id="vt">-</span></div></div>
<div class="sb" id="spec"></div>
<details><summary>전체 가격 변동 타임라인 (2022~2026)</summary><div id="tl"></div></details>
<script>
var P=[
{id:'22a',y:2022,lb:'2022 상반기 (1~6월)',gn:'구형 (프리몬트)',t:{lr:63990000,perf:73990000},nt:'RWD 주문 중단. LR/Perf만 (프리몬트). 추정치(±100만)',cl:'old',hw:'HW3.0',est:true},
{id:'22b',y:2022,lb:'2022 하반기 (7~12월, 최고가)',gn:'구형 (프리몬트)',t:{lr:72740000,perf:82990000},nt:'원자재 폭등 역대 최고가. 추정치(±150만)',cl:'old',hw:'HW3.0',est:true},
{id:'23a',y:2023,lb:'2023.01 (대폭 인하)',gn:'구형 (프리몬트)',t:{lr:63990000,perf:73190000},nt:'LR·Perf 약 10~12% 인하. 추정치(±100만)',cl:'old',hw:'HW3.0',est:true},
{id:'23b',y:2023,lb:'2023.03 (마지막 가격)',gn:'구형 (프리몬트)',t:{rwd:60340000,lr:68950000},nt:'구형 마지막 판매 가격. Perf 중단, RWD 일시 재개',cl:'old',hw:'HW3.0'},
{id:'23c',y:2023,lb:'2023.07 (전 트림 주문 중단)',gn:'-',t:{},nt:'2023.07.14 전 트림 주문 중단. 하이랜드 준비',cl:'old',hw:'-',empty:true},
{id:'24a',y:2024,lb:'2024.04 (하이랜드 출시)',gn:'하이랜드 (기가상하이)',t:{rwd:51990000,lr:59990000},nt:'신형 하이랜드 출시. 구형 대비 800만+ 인하. 전량 중국산',cl:'hl',hw:'HW4.0'},
{id:'24b',y:2024,lb:'2024.04말 (Perf 추가)',gn:'하이랜드 (기가상하이)',t:{rwd:51990000,lr:59990000,perf:64990000},nt:'퍼포먼스 추가 출시 (6,499만)',cl:'hl',hw:'HW4.0'},
{id:'24c',y:2024,lb:'2024.05 (Perf 인상)',gn:'하이랜드 (기가상하이)',t:{rwd:51990000,lr:59990000,perf:69390000},nt:'퍼포먼스 440만 인상 → 6,939만',cl:'hl',hw:'HW4.0'},
{id:'25a',y:2025,lb:'2025.12 (트림 재편)',gn:'하이랜드 (기가상하이)',t:{perf:59990000},nt:'RWD·LR 판매 중단. Perf만 940만 인하 → 5,999만',cl:'hl',hw:'HW4.0'},
{id:'26a',y:2026,lb:'2026.01 (스탠다드·프리미엄 출시)',gn:'하이랜드 (기가상하이)',t:{std:41990000,plr:52990000,perf:59990000},nt:'스탠다드 4,199만 (보조금 포함 3천만원대). 프리미엄LR 5,299만',cl:'hl26',hw:'HW4.0'},
{id:'26b',y:2026,lb:'2026.04.10 (Perf 인상, 현재)',gn:'하이랜드 (기가상하이)',t:{std:41990000,plr:52990000,perf:64990000},nt:'퍼포먼스 +500만→6,499만. 스탠다드·프리미엄LR 유지',cl:'hl26',hw:'HW4.0'}
];
var CS={
old:[{n:'Pearl White (기본)',p:0},{n:'Solid Black (+128.6만)',p:1286000},{n:'Midnight Silver (+128.6만)',p:1286000},{n:'Deep Blue (+128.6만)',p:1286000},{n:'Red Multi-Coat (+257.1만)',p:2571000}],
hl:[{n:'Pearl White (기본)',p:0},{n:'Solid Black (+192.9만)',p:1929000},{n:'Stealth Grey (+128.6만)',p:1286000},{n:'Ultra Red (+257.1만)',p:2571000},{n:'Quicksilver (+275.9만)',p:2759000}],
hl26:[{n:'Stealth Grey (기본)',p:0},{n:'Pearl White (+128.6만)',p:1286000},{n:'Solid Black (+192.9만)',p:1929000},{n:'Ultra Red (+257.1만)',p:2571000},{n:'Quicksilver (+275.9만)',p:2759000}]
};
var WM={rwd:[{n:'18" Photon (기본)',p:0},{n:'19" Nova (+128.6만)',p:1286000}],lr:[{n:'18" Photon (기본)',p:0},{n:'19" Nova (+128.6만)',p:1286000}],perf:[{n:'20" Warp (기본)',p:0}],std:[{n:'18" Prismata (기본)',p:0}],plr:[{n:'18" Photon (기본)',p:0},{n:'19" Nova (+128.6만)',p:1286000}]};
var TN={std:'Standard',rwd:'RWD',lr:'Long Range',perf:'Performance',plr:'프리미엄 LR'};
var TS2={std:'후륜구동',rwd:'후륜구동',lr:'AWD',perf:'AWD',plr:'후륜구동'};
var c,st;
function $(i){return document.getElementById(i);}
function f(n){return(n/10000).toLocaleString('ko-KR')+'만원';}
function init(){var s=$('period');P.forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.lb;s.appendChild(o);});s.value='26b';s.onchange=ld;$('color').onchange=calc;$('int').onchange=calc;$('wheel').onchange=calc;$('fsd').onchange=calc;bt();ld();}
function ld(){c=P.find(function(p){return p.id===$('period').value;});$('gen').textContent=c.gn+(c.hw&&c.hw!=='-'?' · '+c.hw:'');var nb=$('nb');if(c.nt){nb.textContent=c.nt;nb.style.display='block';}else nb.style.display='none';var k=Object.keys(c.t);if(c.empty||k.length===0){$('trims').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--tx3);font-size:13px;">이 시기에는 주문이 중단된 상태입니다.</div>';$('trims').style.gridTemplateColumns='1fr';st=null;$('vb').textContent='-';$('vo').textContent='-';$('vt').textContent='-';rs();return;}st=k.indexOf('rwd')>=0?'rwd':(k.indexOf('std')>=0?'std':k[0]);rt();rc();rw();rf();rs();calc();}
function rt(){var d=$('trims');d.innerHTML='';var k=Object.keys(c.t);d.style.gridTemplateColumns='repeat('+Math.min(k.length,3)+', 1fr)';k.forEach(function(x){var a=x===st,e=document.createElement('div');e.className='tc'+(a?' a':'');e.innerHTML='<div class="n">'+(TN[x]||x)+'</div><div class="s2">'+(TS2[x]||'')+'</div><div class="pr">'+f(c.t[x])+'</div>';e.onclick=function(){st=x;rt();rw();calc();};d.appendChild(e);});}
function rc(){var s=$('color');s.innerHTML='';(CS[c.cl]||CS.old).forEach(function(x){var o=document.createElement('option');o.value=x.p;o.textContent=x.n;s.appendChild(o);});}
function rw(){var s=$('wheel');s.innerHTML='';var wl=WM[st]||[{n:'기본 휠',p:0}];if(c.gn&&c.gn.indexOf('구형')>=0&&st==='perf')wl=[{n:'20" Überturbine (기본)',p:0}];wl.forEach(function(w){var o=document.createElement('option');o.value=w.p;o.textContent=w.n;s.appendChild(o);});}
function rf(){var s=$('fsd');s.innerHTML='<option value="0">오토파일럿 (기본)</option>';if(c.y<=2023&&!c.empty)s.innerHTML+='<option value="8900000">FSD (+890만)</option><option value="4500000">향상된 오토파일럿 (+450만)</option>';}
function rs(){var b=$('spec'),S={'22a':{b:'LR: 2170(LG/파나), Perf: 리튬이온',r:'LR~568, Perf~547km',m:'듀얼AWD',p:'프리몬트'},'22b':{b:'LR: 2170(LG/파나), Perf: 리튬이온',r:'LR~568, Perf~547km',m:'듀얼AWD',p:'프리몬트'},'23a':{b:'LR: 리튬이온(LG), Perf: 리튬이온',r:'LR~568, Perf~547km',m:'듀얼AWD',p:'프리몬트'},'23b':{b:'RWD: 리튬이온, LR: 리튬이온(LG)',r:'RWD~496, LR~568km',m:'RWD싱글 / LR듀얼',p:'프리몬트'},'23c':{b:'-',r:'-',m:'-',p:'-',x:'주문 중단'},'24a':{b:'RWD:LFP(CATL) / LR:NCM(LG)',r:'RWD~382, LR~488km',m:'RWD싱글 / LR듀얼',p:'기가상하이',x:'이중접합유리, 주파수반응형 댐퍼'},'24b':{b:'RWD:LFP / LR:NCM / Perf:NCM',r:'RWD~382, LR~488, Perf~460km',m:'RWD싱글 / LR·Perf듀얼',p:'기가상하이'},'24c':{b:'RWD:LFP / LR:NCM / Perf:NCM',r:'RWD~382, LR~488, Perf~460km',m:'RWD싱글 / LR·Perf듀얼',p:'기가상하이'},'25a':{b:'Perf: NCM(LG)',r:'Perf~460km',m:'듀얼AWD',p:'기가상하이',x:'RWD·LR 판매중단'},'26a':{b:'Std:LFP(축소) / PLR:NCM(LG) / Perf:NCM',r:'Std~363, PLR~551, Perf~460km',m:'Std·PLR싱글후륜 / Perf듀얼',p:'기가상하이',x:'Std: 주파수반응형 댐퍼 미탑재'},'26b':{b:'Std:LFP(축소) / PLR:NCM(LG) / Perf:NCM',r:'Std~363, PLR~551, Perf~460km',m:'Std·PLR싱글후륜 / Perf듀얼',p:'기가상하이',x:'Perf +500만 인상 (6,499만)'}};var s=S[c.id]||{};b.innerHTML='<h3>주요 제원</h3><p>&#8226; 배터리: '+(s.b||'-')+'</p><p>&#8226; 주행거리: '+(s.r||'-')+'</p><p>&#8226; 구동: '+(s.m||'-')+'</p><p>&#8226; 생산지: '+(s.p||'-')+'</p><p>&#8226; HW: '+(c.hw||'-')+'</p>'+(s.x?'<p>&#8226; 특이사항: '+s.x+'</p>':'');}
function calc(){if(!st||c.empty)return;var b=c.t[st],cp=parseInt($('color').value)||0,ip=parseInt($('int').value)||0,wp=parseInt($('wheel').value)||0,fp=parseInt($('fsd').value)||0,o=cp+ip+wp+fp;$('vb').textContent=f(b);$('vo').textContent=o>0?'+'+f(o):'0원';$('vt').textContent=f(b+o);}
function bt(){var h='<table class="tt"><tr><th>시기</th><th>RWD/Std</th><th>LR</th><th>Perf</th></tr>';P.forEach(function(p){if(p.empty){h+='<tr><td style="white-space:nowrap;">'+p.lb.split('(')[0].trim()+'</td><td colspan="3" style="text-align:center;color:var(--tx3);">주문 중단</td></tr>';return;}var r=p.t.rwd||p.t.std||p.t.plr||null,l=p.t.lr||null,pf=p.t.perf||null,e=p.est?' class="est"':'';h+='<tr><td style="white-space:nowrap;">'+p.lb.split('(')[0].trim()+'</td><td'+e+'>'+(r?Math.round(r/10000).toLocaleString():'—')+'</td><td'+e+'>'+(l?Math.round(l/10000).toLocaleString():'—')+'</td><td'+e+'>'+(pf?Math.round(pf/10000).toLocaleString():'—')+'</td></tr>';});h+='</table><p class="tn">단위: 만원 · <em>이탤릭</em> = 추정치(±100~150만)</p>';$('tl').innerHTML=h;}
