<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#fff;--bg2:#f7f7f5;--tx:#1a1a1a;--tx2:#6b6b6b;--tx3:#9b9b9b;--bd:#e3e2de;--bd2:#d4d3cf;--accent:#2383e2;--accent-bg:#e8f0fe;--warn-bg:#fef3cd;--warn-tx:#856404;--radius:6px;--radius-lg:8px;--font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
@media(prefers-color-scheme:dark){:root{--bg:#191919;--bg2:#252525;--tx:#e0e0e0;--tx2:#999;--tx3:#666;--bd:#3a3a3a;--bd2:#4a4a4a;--accent:#529cca;--accent-bg:#1a2d3d;--warn-bg:#3d3520;--warn-tx:#d4a843;}}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;padding:20px;max-width:720px;margin:0 auto;}
h2{font-size:20px;font-weight:600;margin-bottom:2px;}
.sub{font-size:12px;color:var(--tx2);margin-bottom:20px;}
label{font-size:13px;color:var(--tx2);display:block;margin-bottom:4px;}
select{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--radius);background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;outline:none;}
select:hover{border-color:var(--bd2);}select:focus{border-color:var(--accent);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.grid3{display:grid;gap:8px;margin-bottom:16px;}
.tc{padding:10px;border:1px solid var(--bd);border-radius:var(--radius-lg);text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);}
.tc:hover{border-color:var(--bd2);background:var(--bg2);}
.tc.a{border:2px solid var(--accent);background:var(--accent-bg);}
.tc .n{font-size:13px;font-weight:600;margin-bottom:1px;}
.tc .s2{font-size:11px;color:var(--tx3);margin-bottom:6px;}
.tc .pr{font-size:15px;font-weight:600;}
.note{font-size:12px;color:var(--warn-tx);background:var(--warn-bg);padding:8px 12px;border-radius:var(--radius);margin-bottom:12px;}
.cb{background:var(--bg2);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;}
.cr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13px;}
.cr .l{color:var(--tx2);}
.ct{border-top:1px solid var(--bd);padding-top:8px;margin-top:4px;display:flex;justify-content:space-between;align-items:baseline;}
.ct .l{font-weight:600;font-size:14px;}
.ct .v{font-size:22px;font-weight:700;}
.sb{border:1px solid var(--bd);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px;}
.sb h3{font-size:14px;font-weight:600;margin-bottom:8px;}
.sb p{font-size:12px;color:var(--tx2);margin-bottom:3px;}
.gb{font-size:12px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bd);}
details{margin-bottom:16px;}
summary{font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;}
summary:hover{color:var(--accent);}
.tt{width:100%;font-size:12px;border-collapse:collapse;}
.tt th{text-align:left;padding:6px 4px;color:var(--tx2);border-bottom:1px solid var(--bd);font-weight:500;}
.tt th:not(:first-child){text-align:right;}
.tt td{padding:5px 4px;border-bottom:1px solid var(--bd);}
.tt td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums;}
.tn{font-size:11px;color:var(--tx3);margin-top:8px;}
</style>
</head>
